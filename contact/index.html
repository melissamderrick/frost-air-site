<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Frost Air LLC</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-blue-50 text-gray-800">
 
	<!-- Navigation -->
	
  <nav class="bg-white shadow-md py-4 px-6 flex justify-between items-center text-blue-700 font-semibold">
    <img src="../assets/logo_c.png" alt="Frost Air Logo" class="w-28">
     <div class="flex gap-6">
      <a href="../home/index.html">Home</a>
      <a href="../services/index.html">Services</a>
      <a href="../about/index.html">About</a>
      <a href="../contact/index.html" class="text-blue-900 font-bold">Contact</a>
    </div>
  </nav>
	
  <header class="bg-blue-200 relative text-center py-20 px-4">
    <h1 class="text-5xl font-bold text-blue-800 mb-4">Frost Air LLC</h1>
    <p class="text-xl mb-6 text-blue-900">Your Trusted HVAC Specialists in Arizona</p>
    <a href="../contact/index.html" class="inline-block bg-blue-600 text-white hover:bg-blue-700 text-lg px-6 py-3 rounded-xl shadow-xl">
      Schedule Service
    </a>
  </header>
	
  <!-- Contact Info and Form -->
	
  <main class="py-16 px-6 text-center">
    <h2 class="text-3xl font-bold text-blue-700 mb-4">Get In Touch</h2>
    <p class="text-gray-700 mb-6">Ready to stay frosty? Contact us today!</p>

    <div class="flex flex-col items-center gap-4 mb-10">
      <div class="flex items-center gap-2 text-blue-800 text-lg">
        <span>📞</span><span>(480) 123-4567</span>
      </div>
      <div class="flex items-center gap-2 text-blue-800 text-lg">
        <span>📧</span><span>info@frostairaz.com</span>
      </div>
    </div>

    <!-- Contact Form -->
    <form action="mailto:info@frostairaz.com" method="POST" enctype="text/plain"
      class="max-w-2xl mx-auto text-left bg-white p-6 rounded-2xl shadow-lg space-y-4">
      <div>
        <label for="name" class="block text-blue-800 font-semibold">Name</label>
        <input type="text" id="name" name="name" class="w-full p-2 rounded border border-blue-200" required />
      </div>
      <div>
        <label for="email" class="block text-blue-800 font-semibold">Email</label>
        <input type="email" id="email" name="email" class="w-full p-2 rounded border border-blue-200" required />
      </div>
      <div>
        <label for="message" class="block text-blue-800 font-semibold">Message</label>
        <textarea id="message" name="message" rows="4" class="w-full p-2 rounded border border-blue-200" required></textarea>
      </div>
      <button type="submit" class="bg-blue-600 text-white hover:bg-blue-700 w-full py-2 text-lg rounded-xl shadow">
        Send Message
      </button>
    </form>
  </main>

  <footer class="bg-blue-200 text-center text-blue-900 py-4 text-sm">
   © 2025 Frost Air LLC . Stay Frosty . ROC
  </footer>
</body>
</html>
